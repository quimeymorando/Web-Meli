            - paragraph [ref=e500]: Conocí a Meli en uno de los momentos más desordenados de mi vida. Estaba bloqueado, estresado, sin trabajo estable. Tenía muchas ideas e ilusión, pero no sabía cómo convertir eso en una realidad concreta. Empezó un proceso que fue mucho más que coaching. Hoy, gracias a ese proceso, estoy trabajando en el sector inmobiliario con estabilidad laboral y haciendo algo que realmente me gusta. El mayor valor de Meli no es solo lo que sabe, sino cómo te acompaña. Fue un punto de inflexión real en mi vida. La recomiendo sin dudarlo.
